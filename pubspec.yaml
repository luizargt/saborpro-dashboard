name: saborpro_reports
description: SaborPro Analytics - Dashboard de reportes para gerentes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0

  # State Management
  provider: ^6.1.1

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  fl_chart: ^1.1.1
  lucide_icons: ^0.257.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  excel: ^4.0.6
  sentry_flutter: ^8.14.2

  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Gerencia.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/images/Gerencia.png"
  web:
    generate: true
    image_path: "assets/images/Gerencia.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
